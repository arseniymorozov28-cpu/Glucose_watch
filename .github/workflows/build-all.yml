name: Build All

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-wearos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WearGlucoWatchBLE

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload Wear OS APK
        uses: actions/upload-artifact@v4
        with:
          name: WearGlucoWatch-BLE-APK
          path: WearGlucoWatchBLE/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  build-ios:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: GlucoWatchiOS
        run: xcodegen generate

      - name: Build for simulator
        working-directory: GlucoWatchiOS
        run: |
          set -o pipefail
          xcodebuild \
            -project GlucoWatchiOS.xcodeproj \
            -scheme GlucoWatchiOS \
            -sdk iphonesimulator \
            -configuration Debug \
            build | xcpretty

      - name: Upload iOS simulator build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-log
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 3
