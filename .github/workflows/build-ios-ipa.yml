name: Build iPhone IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "AppleGlucoBridge/**"
      - ".github/workflows/build-ios-ipa.yml"

jobs:
  build-ipa:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: AppleGlucoBridge
        run: xcodegen generate

      - name: Import signing certificate
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_DEVELOPMENT_TEAM != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -D -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_DEVELOPMENT_TEAM != '' }}
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D -o "$PROFILE_PATH"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Archive app
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_DEVELOPMENT_TEAM != '' }}
        working-directory: AppleGlucoBridge
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          xcodebuild \
            -project AppleGlucoBridge.xcodeproj \
            -scheme AppleGlucoBridgePhone \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/AppleGlucoBridgePhone.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            clean archive

      - name: Export IPA
        if: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_DEVELOPMENT_TEAM != '' }}
        working-directory: AppleGlucoBridge
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          EXPORT_PLIST="$RUNNER_TEMP/exportOptions.plist"
          cp exportOptions.plist "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Set :teamID $DEVELOPMENT_TEAM" "$EXPORT_PLIST"
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/AppleGlucoBridgePhone.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$EXPORT_PLIST"

      - name: Build unsigned IPA
        if: ${{ !(secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_DEVELOPMENT_TEAM != '') }}
        working-directory: AppleGlucoBridge
        run: |
          xcodebuild \
            -project AppleGlucoBridge.xcodeproj \
            -scheme AppleGlucoBridgePhone \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/AppleGlucoBridgePhone.app"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          /usr/bin/zip -r "$RUNNER_TEMP/AppleGlucoBridge-unsigned.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppleGlucoBridge-IPA
          path: |
            ${{ runner.temp }}/ipa/*.ipa
            ${{ runner.temp }}/AppleGlucoBridge-unsigned.ipa
