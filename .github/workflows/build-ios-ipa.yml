name: Build iPhone IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "AppleGlucoBridge/**"
      - ".github/workflows/build-ios-ipa.yml"

jobs:
  build-ipa:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: AppleGlucoBridge
        run: xcodegen generate

      - name: Build unsigned IPA
        working-directory: AppleGlucoBridge
        run: |
          xcodebuild \
            -project AppleGlucoBridge.xcodeproj \
            -scheme AppleGlucoBridgePhone \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/AppleGlucoBridgePhone.app"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          /usr/bin/zip -r "$RUNNER_TEMP/AppleGlucoBridge-unsigned.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppleGlucoBridge-IPA
          path: |
            ${{ runner.temp }}/ipa/*.ipa
            ${{ runner.temp }}/AppleGlucoBridge-unsigned.ipa
